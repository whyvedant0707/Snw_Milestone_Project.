<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CineScope</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav>
    <h1>🌟 CineScope</h1>
    <input type="text" id="search" placeholder="Search movies...">
    <select id="typeFilter">
      <option value="">All</option>
      <option value="movie">Movie</option>
      <option value="series">Series</option>
    </select>
    <select id="sortYear">
      <option value="">Sort by Year</option>
      <option value="asc">Oldest</option>
      <option value="desc">Newest</option>
    </select>
    <button id="themeToggle">🌙</button>
  </nav>

  <!-- Movies_Container -->
   <!-- Home Section -->
<div id="home">
  <h2>Welcome to CineScope 🎬</h2>
  <p>Search and explore your favorite movies</p>

  <div class="suggestions">
    <button onclick="quickSearch('Avengers')">Avengers</button>
    <button onclick="quickSearch('Batman')">Batman</button>
    <button onclick="quickSearch('Harry Potter')">Harry Potter</button>
  </div>
</div>

<!-- 🎬 Movies Container -->
<div id="movies"></div>
  <script src="script.js"></script>
</body>
</html>
